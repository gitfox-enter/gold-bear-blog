<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3d1a00;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="75%" cy="25%" r="25%">
      <stop offset="0%" style="stop-color:#ff8c00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#sunGlow)"/>

  <!-- Mountain silhouettes (snow-capped) -->
  <g opacity="0.4">
    <!-- Distant mountains -->
    <path d="M 0,500 L 80,340 L 150,420 L 200,310 L 280,400 L 350,280 L 420,380 L 480,290 L 550,370 L 620,300 L 700,400 L 760,330 L 800,500 Z" fill="#0a0500"/>
    <!-- Snow caps highlight -->
    <path d="M 340,278 L 350,280 L 360,277 Z" fill="#ffffff" opacity="0.3"/>
    <path d="M 470,288 L 480,290 L 490,287 Z" fill="#ffffff" opacity="0.3"/>
    <path d="M 610,298 L 620,300 L 630,297 Z" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Rising sun -->
  <g transform="translate(640, 120)">
    <circle cx="0" cy="0" r="50" fill="#ff4500" opacity="0.15"/>
    <circle cx="0" cy="0" r="30" fill="#ff6600" opacity="0.3"/>
    <circle cx="0" cy="0" r="15" fill="#ffaa00" opacity="0.5"/>
    <!-- Sun rays -->
    <g opacity="0.15">
      <line x1="-60" y1="0" x2="-100" y2="0" stroke="#ff8c00" stroke-width="2"/>
      <line x1="60" y1="0" x2="100" y2="0" stroke="#ff8c00" stroke-width="2"/>
      <line x1="0" y1="-60" x2="0" y2="-100" stroke="#ff8c00" stroke-width="2"/>
      <line x1="0" y1="60" x2="0" y2="100" stroke="#ff8c00" stroke-width="2"/>
      <line x1="-42" y1="-42" x2="-70" y2="-70" stroke="#ff8c00" stroke-width="1.5"/>
      <line x1="42" y1="-42" x2="70" y2="-70" stroke="#ff8c00" stroke-width="1.5"/>
      <line x1="-42" y1="42" x2="-70" y2="70" stroke="#ff8c00" stroke-width="1.5"/>
      <line x1="42" y1="42" x2="70" y2="70" stroke="#ff8c00" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Tibetan warrior silhouette (left side) -->
  <g transform="translate(120, 320)" opacity="0.25" filter="url(#shadow)">
    <!-- Body -->
    <rect x="-12" y="-60" width="24" height="60" rx="3" fill="#1a0a00"/>
    <!-- Head -->
    <circle cx="0" cy="-75" r="14" fill="#1a0a00"/>
    <!-- Hero knot (hair) -->
    <path d="M -8,-80 Q 0,-95 8,-80" fill="none" stroke="#2a1a00" stroke-width="3"/>
    <!-- Sword/knife held up -->
    <line x1="15" y1="-40" x2="20" y2="-90" stroke="#1a0a00" stroke-width="3"/>
    <line x1="20" y1="-90" x2="20" y2="-110" stroke="#888" stroke-width="2"/>
    <!-- Cape/robe flowing -->
    <path d="M -12,-40 Q -25,-20 -30,0 L -12,0 Z" fill="#1a0a00" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="400" y="155" text-anchor="middle" font-family="serif, 宋体" font-size="44" font-weight="bold" fill="#ff8c00" filter="url(#shadow)">藏王照我去战斗</text>

  <!-- Subtitle -->
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#cc9933">康巴人的血性 · 从格萨尔到现代</text>

  <!-- Divider (sword-like) -->
  <line x1="180" y1="230" x2="620" y2="230" stroke="#ff8c00" stroke-width="1.5" opacity="0.5"/>
  <polygon points="620,224 635,230 620,236" fill="#ff8c00" opacity="0.5"/>

  <!-- Themes -->
  <text x="400" y="280" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#ffaa44">康巴土匪 · 强盗歌 · 决斗精神</text>
  <text x="400" y="315" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#dd8833">海因里希·哈勒 · 康巴式决斗</text>
  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#aa7744">「他们虔诚信佛，也随时准备抽刀杀人」</text>

  <!-- Bottom bar -->
  <rect x="0" y="465" width="800" height="35" fill="#1a0a00" opacity="0.9"/>
  <text x="400" y="488" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8c00" opacity="0.6">扬卡洛夫 · Khamba Warriors · 勇敢者的消亡</text>

  <!-- Decorative rope pattern (Tibetan knot motif) -->
  <g transform="translate(400, 425)" opacity="0.15">
    <path d="M -50,0 Q -25,-15 0,0 Q 25,15 50,0" fill="none" stroke="#ff8c00" stroke-width="1.5"/>
    <path d="M -50,0 Q -25,15 0,0 Q 25,-15 50,0" fill="none" stroke="#ff8c00" stroke-width="1.5"/>
  </g>
</svg>
