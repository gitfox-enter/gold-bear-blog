<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="darkness" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#2a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="fireGlow" cx="30%" cy="65%" r="35%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#darkness)"/>
  <rect width="800" height="500" fill="url(#fireGlow)"/>

  <!-- Cave opening (arch) -->
  <path d="M 200,500 Q 400,180 600,500 Z" fill="#0a0a0a" stroke="#3a1a1a" stroke-width="2" opacity="0.8"/>

  <!-- Campfire -->
  <g transform="translate(400, 380)">
    <!-- Logs -->
    <line x1="-30" y1="10" x2="30" y2="-10" stroke="#5a3a1a" stroke-width="5" opacity="0.6"/>
    <line x1="-25" y1="-5" x2="25" y2="15" stroke="#5a3a1a" stroke-width="5" opacity="0.6"/>
    <!-- Flames -->
    <g opacity="0.9" filter="url(#blur)">
      <ellipse cx="0" cy="-15" rx="8" ry="25" fill="#ff4500" opacity="0.8"/>
      <ellipse cx="-5" cy="-10" rx="6" ry="18" fill="#ffa500" opacity="0.7"/>
      <ellipse cx="4" cy="-12" rx="5" ry="20" fill="#ff6347" opacity="0.6"/>
      <ellipse cx="0" cy="-25" rx="4" ry="12" fill="#ffff00" opacity="0.5"/>
    </g>
    <!-- Glow on ground -->
    <ellipse cx="0" cy="10" rx="80" ry="15" fill="#ff4500" opacity="0.15"/>
  </g>

  <!-- Ghost figure (vague humanoid shape) -->
  <g transform="translate(400, 220)" opacity="0.35">
    <!-- Head -->
    <circle cx="0" cy="-40" r="22" fill="#3a3a3a"/>
    <!-- Tattered robe -->
    <path d="M -25,-20 Q -30,40 -35,80 L 35,80 Q 30,40 25,-20 Z" fill="#2a2a2a"/>
    <!-- Eyes glow -->
    <circle cx="-8" cy="-44" r="3" fill="#ff0000" opacity="0.7"/>
    <circle cx="8" cy="-44" r="3" fill="#ff0000" opacity="0.7"/>
  </g>

  <!-- Mountain silhouettes -->
  <g opacity="0.3">
    <path d="M 0,500 L 100,350 L 200,500 Z" fill="#1a0a0a"/>
    <path d="M 150,500 L 280,300 L 400,500 Z" fill="#150808"/>
    <path d="M 350,500 L 480,320 L 600,500 Z" fill="#1a0a0a"/>
    <path d="M 580,500 L 680,360 L 800,500 Z" fill="#150808"/>
  </g>

  <!-- Stars (few, dim) -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="100" cy="40" r="1"/>
    <circle cx="250" cy="70" r="1.2"/>
    <circle cx="500" cy="30" r="1"/>
    <circle cx="650" cy="60" r="1.5"/>
    <circle cx="720" cy="25" r="0.8"/>
  </g>

  <!-- Main title -->
  <text x="400" y="130" text-anchor="middle" font-family="serif, 宋体" font-size="40" font-weight="bold" fill="#cc2222" opacity="0.9">藏地诡闻录</text>
  <text x="400" y="175" text-anchor="middle" font-family="serif, 宋体" font-size="32" font-weight="bold" fill="#cc4444" opacity="0.8">之旅鬼</text>

  <!-- Subtitle -->
  <text x="400" y="220" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#aa6666" opacity="0.7">扬卡洛夫 · 康巴商人的夜遇</text>

  <!-- Divider -->
  <line x1="220" y1="250" x2="580" y2="250" stroke="#662222" stroke-width="1" opacity="0.5"/>

  <!-- Story tags -->
  <text x="400" y="295" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#cc5555">旅鬼 · 食人妖 · 格萨尔王</text>
  <text x="400" y="325" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#aa6666">巴颜喀拉山 · 藏刀 · 佛龛</text>

  <!-- Atmospheric text -->
  <text x="400" y="390" text-anchor="middle" font-family="serif" font-size="14" fill="#882222" opacity="0.5" font-style="italic">「遇见旅鬼，能活下来的寥寥无几……」</text>

  <!-- Bottom bar -->
  <rect x="0" y="470" width="800" height="30" fill="#0a0a0a" opacity="0.8"/>
  <text x="400" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#662222" opacity="0.6">扬卡洛夫 · Tibetan Ghost Story · 旅鬼</text>
</svg>
